version: '3.8'

services:
  # Core Stack State Coordinator
  orchestrator:
    image: python:3.11-slim
    container_name: god_orchestrator
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: bash -c "pip install --no-cache-dir courlan requests prometheus_client && python3 orchestrator.py"
    restart: unless-stopped

  # Unified GUI Operations & Verification Harness
  ui-harness:
    image: python:3.11-slim
    container_name: god_ui_harness
    depends_on:
      - orchestrator
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
    # Installs system-level X11 virtual server dependencies before executing the master loop
    command: >
      bash -c "apt-get update && 
               apt-get install -y python3-tk xvfb x11-utils && 
               pip install -r requirements.txt || true &&
               xvfb-run --server-args='-screen 0 1024x768x24' python3 master_launcher.py"
    restart: unless-stopped

  # Metrics Gateway Integration
  prometheus:
    image: prom/prometheus:latest
    container_name: god_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
