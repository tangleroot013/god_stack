<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>God Stack // Orchestration Dashboard</title>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        #alert-banner {
            display: none;
            background-color: #8b0000;
            color: #ffcccc;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            border: 2px solid #ff0000;
            margin-bottom: 20px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .container {
            border: 1px solid #30363d;
            padding: 20px;
            background-color: #161b22;
        }
        h1 { color: #c9d1d9; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        pre { color: #7ee787; background: #010409; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>

    <div id="alert-banner">🛑 CRITICAL CLUSTER SATURATION: EDGE INGESTION LOCK APPLIED</div>

    <div class="container">
        <h1>Orchestrator Management Matrix (v1.56.0)</h1>
        <h3>Gateway Status: <span id="gateway-status" style="color: #7ee787;">NOMINAL</span></h3>
        
        <div style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <h3>Real-Time Health Stream</h3>
                <pre id="health-raw">Awaiting telemetry frames...</pre>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                
                document.getElementById('health-raw').textContent = JSON.stringify(data, null, 4);
                
                const banner = document.getElementById('alert-banner');
                const statusTxt = document.getElementById('gateway-status');
                
                if (data.global_action === "THROTTLE_INGESTION") {
                    banner.style.display = 'block';
                    statusTxt.textContent = "SATURATED (BACKPRESSURE ACTIVE)";
                    statusTxt.style.color = '#ff7b72';
                } else {
                    banner.style.display = 'none';
                    statusTxt.textContent = "NOMINAL";
                    statusTxt.style.color = '#7ee787';
                }
            } catch (e) {
                console.error("Telemetry stream interrupted:", e);
            }
        }
        
        setInterval(updateDashboard, 1000);
        updateDashboard();
    </script>
</body>
</html>
