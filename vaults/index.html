<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>G.O.D. SYSTEM // CLUSTER MAIN CONTROL</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        body {
            background-color: #0d0f12;
            color: #00ff66;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        #header {
            border-bottom: 2px solid #00ff66;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        #main-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            height: 75vh;
        }
        #network-container {
            flex: 2;
            border: 1px dashed #00ff66;
            background-color: #11141a;
        }
        #telemetry-panel {
            flex: 1;
            border: 1px solid #00ff66;
            background-color: #080a0d;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.85em;
        }
        .node-alert { color: #ff3333; font-weight: bold; }
        .node-warn { color: #ffff33; }
        .node-ok { color: #00ff66; }
    </style>
</head>
<body>

<div id="header">
    <h2>📡 G.O.D. SYSTEM // UNIFIED STRUCTURAL & LATENCY DASHBOARD</h2>
    <div>METRICS STATUS: LIVE PERF EDGES INJECTED // PIPELINE INTERLOCKED // RELEASE v1.51.0</div>
</div>

<div id="main-layout">
    <div id="network-container"></div>
    <div id="telemetry-panel">
        <h3>📊 REAL-TIME PROXY ROUTING OVERHEAD</h3>
        <hr style="border: 1px solid #00ff66;">
        <div id="telemetry-grid">Awaiting live metrics telemetry cycle...</div>
    </div>
</div>

<script type="text/javascript">
    let network = null;
    let lastSignal = null;

    async function updateDashboard() {
        try {
            const [graphRes, telemetryRes] = await Promise.all([
                fetch('matrix_map.json?t=' + Date.now()),
                fetch('telemetry_map.json?t=' + Date.now())
            ]);
            
            const matrix = await graphRes.json();
            const telData = await telemetryRes.json();
            
            // Build the visual topology mesh passing telemetry data for dynamic coloring
            renderGraphMesh(matrix, telData);
            
            // Generate visual side panel console list
            renderTelemetryGrid(telData);

        } catch (err) {
            console.error("Dashboard update drop:", err);
        }
    }

    function renderGraphMesh(matrix, telData) {
        const nodesArray = [];
        const edgesArray = [];
        const uniqueNodes = new Set();

        Object.keys(matrix).forEach(source => {
            uniqueNodes.add(source);
            matrix[source].forEach(target => {
                uniqueNodes.add(target);
                
                // Determine edge color dynamically based on live latency data
                let edgeColor = '#00ff66'; // Default Nominal
                let edgeWidth = 1.5;
                
                if (telData[source] && telData[source][target] !== undefined) {
                    const rtt = telData[source][target];
                    if (rtt > 150) {
                        edgeColor = '#ff3333'; // Congested Link
                        edgeWidth = 3.5;
                    } else if (rtt > 50) {
                        edgeColor = '#ffff33'; // Overhead Warning
                        edgeWidth = 2.5;
                    }
                }

                edgesArray.push({ 
                    from: source, 
                    to: target, 
                    arrows: 'to', 
                    width: edgeWidth,
                    color: { color: edgeColor, highlight: edgeColor } 
                });
            });
        });

        uniqueNodes.forEach(node => {
            nodesArray.push({
                id: node, label: node, shape: 'dot', size: 22,
                color: { background: '#0d0f12', border: '#00ff66', highlight: '#00ff66' },
                font: { color: '#00ff66', face: 'Courier New' }
            });
        });

        const container = document.getElementById('network-container');
        const data = { nodes: new vis.DataSet(nodesArray), edges: new vis.DataSet(edgesArray) };
        const options = { 
            physics: { barnesHut: { centralGravity: 0.2, springLength: 120 } } 
        };
        
        if (!network) {
            network = new vis.Network(container, data, options);
        } else {
            network.setData(data);
        }
    }

    function renderTelemetryGrid(data) {
        const grid = document.getElementById('telemetry-grid');
        let html = '<table width="100%" border="0" cellspacing="5">';
        html += '<tr><th>ROUTE</th><th>RTT (ms)</th><th>STATUS</th></tr>';

        Object.keys(data).forEach(src => {
            Object.keys(data[src]).forEach(dst => {
                if (src === dst) return;
                const rtt = data[src][dst];
                let statusClass = 'node-ok';
                let tag = 'NOMINAL';
                
                if (rtt > 150) { statusClass = 'node-alert'; tag = 'CONGESTED'; }
                else if (rtt > 50) { statusClass = 'node-warn'; tag = 'OVERHEAD'; }

                html += `<tr>
                    <td>${src} ➔ ${dst.substring(0,6)}</td>
                    <td class="${statusClass}">${rtt} ms</td>
                    <td class="${statusClass}">[${tag}]</td>
                </tr>`;
            });
        });
        html += '</table>';
        grid.innerHTML = html;
    }

    async function checkRefresh() {
        try {
            const res = await fetch('.refresh_signal?t=' + Date.now());
            if (res.ok) {
                const signal = await res.text();
                if (signal !== lastSignal) {
                    lastSignal = signal;
                    await updateDashboard();
                }
            }
        } catch (e) {}
    }

    setInterval(checkRefresh, 1500);
    updateDashboard();
</script>
</body>
</html>
