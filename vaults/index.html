<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>G.O.D. SYSTEM // LIVE MATRIX GRAPH</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        body {
            background-color: #0d0f12;
            color: #00ff66;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        #header {
            border-bottom: 2px solid #00ff66;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0,255,102,0.5);
        }
        #network-container {
            width: 100vw;
            height: 80vh;
            border: 1px dashed #00ff66;
            background-color: #11141a;
        }
        .footer {
            margin-top: 10px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>

<div id="header">
    <h2>📡 G.O.D. SYSTEM // LIVE HOT-RELOADING ADJACENCY MATRIX</h2>
    <div>SYSTEM STATUS: STREAMING // WATCHER LINKED // NET_MAP V1.48.0</div>
</div>

<div id="network-container"></div>
<div class="footer">⚡ Live monitoring active. Creating new .md targets updates this topology instantly.</div>

<script type="text/javascript">
    let network = null;
    let lastSignal = null;

    async function renderGraph() {
        try {
            const response = await fetch('matrix_map.json?t=' + Date.now());
            const matrix = await response.json();
            
            const nodesArray = [];
            const edgesArray = [];
            const uniqueNodes = new Set();

            Object.keys(matrix).forEach(source => {
                uniqueNodes.add(source);
                matrix[source].forEach(target => {
                    uniqueNodes.add(target);
                    edgesArray.push({
                        from: source, 
                        to: target, 
                        arrows: 'to',
                        color: { color: '#00ff66' }
                    });
                });
            });

            uniqueNodes.forEach(node => {
                nodesArray.push({
                    id: node,
                    label: node,
                    shape: 'dot',
                    size: 20,
                    color: {
                        background: '#0d0f12',
                        border: '#00ff66',
                        highlight: { background: '#00ff66', border: '#ffffff' }
                    },
                    font: { color: '#00ff66', face: 'Courier New', size: 14 }
                });
            });

            const container = document.getElementById('network-container');
            const data = {
                nodes: new vis.DataSet(nodesArray),
                edges: new vis.DataSet(edgesArray)
            };
            
            const options = {
                physics: { barnesHut: { gravitationalConstant: -3000, centralGravity: 0.3, springLength: 95 } },
                interaction: { hover: true, dragNodes: true }
            };

            network = new vis.Network(container, data, options);
        } catch (err) {
            console.error("Failed to load map state:", err);
        }
    }

    async function checkRefresh() {
        try {
            const res = await fetch('.refresh_signal?t=' + Date.now());
            if (res.ok) {
                const signal = await res.text();
                if (signal !== lastSignal) {
                    lastSignal = signal;
                    await renderGraph();
                }
            }
        } catch (e) { /* Server initializing */ }
    }

    // Initial render and set hot-poll routine
    renderGraph();
    setInterval(checkRefresh, 1500);
</script>
</body>
</html>
