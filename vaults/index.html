<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>G.O.D. SYSTEM // INTELLIGENCE VECTOR GRAPH</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        body {
            background-color: #0d0f12;
            color: #00ff66;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        #header {
            border-bottom: 2px solid #00ff66;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0,255,102,0.5);
        }
        #network-container {
            width: 100vw;
            height: 80vh;
            border: 1px dashed #00ff66;
            background-color: #11141a;
        }
        .footer {
            margin-top: 10px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>

<div id="header">
    <h2>📡 G.O.D. SYSTEM // SEARCHLEDGER GLOBAL ADJACENCY MATRIX</h2>
    <div>SYSTEM STATUS: ACTIVE // ENGINES LINKED // NET_MAP V1.46.0</div>
</div>

<div id="network-container"></div>
<div class="footer">💡 Drag nodes to manually arrange topology. Scroll to zoom map layers.</div>

<script type="text/javascript">
    async function initGraph() {
        try {
            const response = await fetch('matrix_map.json');
            const matrix = await response.json();
            
            const nodesArray = [];
            const edgesArray = [];
            const uniqueNodes = new Set();

            // Populate mapping primitives
            Object.keys(matrix).forEach(source => {
                uniqueNodes.add(source);
                matrix[source].forEach(target => {
                    uniqueNodes.add(target);
                    edgesArray.push({
                        from: source, 
                        to: target, 
                        arrows: 'to',
                        color: { color: '#00ff66', hover: '#ffffff' }
                    });
                });
            });

            uniqueNodes.forEach(node => {
                nodesArray.push({
                    id: node,
                    label: node,
                    shape: 'dot',
                    size: 20,
                    color: {
                        background: '#0d0f12',
                        border: '#00ff66',
                        highlight: { background: '#00ff66', border: '#ffffff' }
                    },
                    font: { color: '#00ff66', face: 'Courier New', size: 14 }
                });
            });

            const container = document.getElementById('network-container');
            const data = {
                nodes: new vis.DataSet(nodesArray),
                edges: new vis.DataSet(edgesArray)
            };
            
            const options = {
                physics: {
                    barnesHut: { gravitationalConstant: -3000, centralGravity: 0.3, springLength: 95 }
                },
                interaction: { hover: true, dragNodes: true }
            };

            new vis.Network(container, data, options);
        } catch (err) {
            document.getElementById('network-container').innerHTML = 
                `<div style="color:red; padding:20px;">💥 Failed to stream network state: ${err}</div>`;
        }
    }

    initGraph();
</script>
</body>
</html>
