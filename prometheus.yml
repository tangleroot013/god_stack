global:
  evaluation_interval: 5s
  scrape_interval: 5s

scrape_configs:
  - job_name: god_stack_daemon
    static_configs:
      - targets: ['172.17.0.1:8000']
    scrape_interval: 5s

  - honor_labels: true
    job_name: god_pushgateway
    static_configs:
      - targets:
        - god_pushgateway_service:9091

  - job_name: god_host_exporter
    static_configs:
      - targets:
        - 172.17.0.1:9100
