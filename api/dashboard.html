<div class="panel">
    <h3>CORE IDENTITY REPUTATION</h3>
    <table id="identity-table">
        <thead>
            <tr><th>JAR_ID</th><th>SUCCESS</th><th>BLOCKS</th><th>STATE</th></tr>
        </thead>
        <tbody id="identity-health-body">
            </tbody>
    </table>
</div>

<script>
// JS Handler for the new identity_health event
if (data.event === 'identity_health') {
    const tbody = document.getElementById('identity-health-body');
    tbody.innerHTML = data.payload.map(id => `
        <tr class="${id.status.toLowerCase()}">
            <td>${id.id}</td>
            <td>${id.success_rate}</td>
            <td>${id.blocks}</td>
            <td>[${id.status}]</td>
        </tr>
    `).join('');
}
</script>
